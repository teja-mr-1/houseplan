<svg width="2400" height="2080" viewBox="-50 -50 750 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="-50" y="-50" width="750" height="650" fill="url(#grid)" />
  
  <!-- Plot Boundary -->
  <polygon points="0,450 0,0 570,0 420,450" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
  <text x="-15" y="225" font-family="Arial" font-size="12" text-anchor="middle" transform="rotate(-90 -15 225)" fill="#000">ఉత్తర సరిహద్దు (11' ఖాళీ)</text>
  <text x="285" y="-15" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">తూర్పు సరిహద్దు (14' ఖాళీ)</text>
  <text x="210" y="475" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">పడమర సరిహద్దు (5' ఖాళీ)</text>
  <text x="515" y="220" font-family="Arial" font-size="12" text-anchor="middle" transform="rotate(-71.5 515 220)" fill="#000">దక్షిణ సరిహద్దు (1' ఖాళీ)</text>

  <!-- Plot Dimensions Lines and Text -->
  <!-- North (Left) 45' -->
  <line x1="15" y1="0" x2="15" y2="210" stroke="#1b5e20" stroke-width="1"/>
  <line x1="15" y1="240" x2="15" y2="450" stroke="#1b5e20" stroke-width="1"/>
  <line x1="10" y1="0" x2="20" y2="0" stroke="#1b5e20" stroke-width="1"/>
  <line x1="10" y1="450" x2="20" y2="450" stroke="#1b5e20" stroke-width="1"/>
  <text x="15" y="225" font-family="Arial" font-size="12" fill="#1b5e20" font-weight="bold" text-anchor="middle" transform="rotate(-90 15 225)">45'</text>

  <!-- West (Bottom) 42' -->
  <line x1="0" y1="435" x2="185" y2="435" stroke="#1b5e20" stroke-width="1"/>
  <line x1="235" y1="435" x2="420" y2="435" stroke="#1b5e20" stroke-width="1"/>
  <line x1="0" y1="430" x2="0" y2="440" stroke="#1b5e20" stroke-width="1"/>
  <line x1="420" y1="430" x2="420" y2="440" stroke="#1b5e20" stroke-width="1"/>
  <text x="210" y="440" font-family="Arial" font-size="12" fill="#1b5e20" font-weight="bold" text-anchor="middle">42'</text>

  <!-- East (Top) 42' -->
  <line x1="0" y1="15" x2="185" y2="15" stroke="#1b5e20" stroke-width="1"/>
  <line x1="235" y1="15" x2="420" y2="15" stroke="#1b5e20" stroke-width="1"/>
  <line x1="0" y1="10" x2="0" y2="20" stroke="#1b5e20" stroke-width="1"/>
  <line x1="420" y1="10" x2="420" y2="20" stroke="#1b5e20" stroke-width="1"/>
  <text x="210" y="20" font-family="Arial" font-size="12" fill="#1b5e20" font-weight="bold" text-anchor="middle">42'</text>

  <!-- East Kuni (Top Right) 15' -->
  <line x1="420" y1="15" x2="480" y2="15" stroke="#d32f2f" stroke-width="1"/>
  <line x1="510" y1="15" x2="570" y2="15" stroke="#d32f2f" stroke-width="1"/>
  <line x1="570" y1="10" x2="570" y2="20" stroke="#d32f2f" stroke-width="1"/>
  <text x="495" y="20" font-family="Arial" font-size="12" fill="#d32f2f" font-weight="bold" text-anchor="middle">15'</text>

  <line x1="420" y1="0" x2="420" y2="30" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4"/>
  <polygon points="420,450 420,0 570,0" fill="#c8e6c9" opacity="0.5"/>
  <text x="470" y="150" font-family="Arial" font-size="10" fill="#2e7d32">వదిలేసిన ఆగ్నేయ మూల</text>

  <!-- House Boundary Base -->
  <polygon points="150,140 370,140 370,250 410,250 410,400 110,400 110,250 150,250" fill="#fff" stroke="#000" stroke-width="4"/>
  
  <!-- Color Fills for Small Rooms -->
  <!-- Pooja Room -->
  <rect x="150" y="140" width="40" height="40" fill="#fff9c4" stroke="none"/>
  <!-- NW Bath -->
  <rect x="110" y="350" width="40" height="50" fill="#e3f2fd" stroke="none"/>
  <!-- SW Bath -->
  <rect x="370" y="350" width="40" height="50" fill="#e3f2fd" stroke="none"/>

  <!-- Internal Walls -->
  <!-- East-West separating wall -->
  <line x1="110" y1="250" x2="410" y2="250" stroke="#000" stroke-width="3"/>
  <!-- North-South wall (Full length) -->
  <line x1="260" y1="140" x2="260" y2="400" stroke="#000" stroke-width="3"/>
  
  <!-- Cutout Walls -->
  <!-- Pooja Room -->
  <polyline points="190,140 190,180 150,180" fill="none" stroke="#000" stroke-width="3"/>
  <!-- NW Bath -->
  <polyline points="150,400 150,350 110,350" fill="none" stroke="#000" stroke-width="3"/>
  <!-- SW Bath -->
  <polyline points="370,400 370,350 410,350" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Texts for small rooms -->
  <text x="170" y="165" font-family="Arial" font-size="10" text-anchor="middle">పూజ</text>
  <text x="130" y="375" font-family="Arial" font-size="10" text-anchor="middle" transform="rotate(-90 130 375)">బాత్ (4'x5')</text>
  <text x="390" y="375" font-family="Arial" font-size="10" text-anchor="middle" transform="rotate(-90 390 375)">బాత్ (4'x5')</text>

  <!-- Room Labels -->
  <!-- NW Bedroom -->
  <text x="185" y="320" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">వాయువ్యం బెడ్ రూమ్</text>
  <text x="185" y="335" font-family="Arial" font-size="10" text-anchor="middle">15' x 15'</text>

  <!-- SW Bedroom -->
  <text x="335" y="320" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">నైరుతి బెడ్ రూమ్</text>
  <text x="335" y="335" font-family="Arial" font-size="10" text-anchor="middle">15' x 15'</text>

  <!-- Hall -->
  <text x="205" y="200" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">హాల్</text>
  <text x="205" y="215" font-family="Arial" font-size="10" text-anchor="middle">11' x 11'</text>

  <!-- Kitchen -->
  <text x="315" y="200" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">వంట గది</text>
  <text x="315" y="215" font-family="Arial" font-size="10" text-anchor="middle">11' x 11'</text>

  <!-- Doors -->
  <!-- Main Door (East facing) -->
  <rect x="190" y="135" width="30" height="10" fill="#8d6e63"/>
  <text x="205" y="125" font-family="Arial" font-size="10" fill="#d32f2f" text-anchor="middle">మెయిన్ డోర్</text>

  <!-- Kitchen Exit Door (South wall) -->
  <rect x="365" y="220" width="10" height="20" fill="#fff" stroke="#fff" stroke-width="2"/>

  <!-- Hall to NW Bed Door -->
  <rect x="190" y="245" width="20" height="10" fill="#fff" stroke="#fff" stroke-width="2"/>

  <!-- Kitchen to SW Bed Door -->
  <rect x="280" y="245" width="20" height="10" fill="#fff" stroke="#fff" stroke-width="2"/>
  
  <!-- Hall to Kitchen Door -->
  <rect x="255" y="190" width="10" height="20" fill="#fff" stroke="#fff" stroke-width="2"/>

  <!-- Pooja Room Door -->
  <rect x="160" y="175" width="20" height="10" fill="#fff" stroke="#fff" stroke-width="2"/>

  <!-- NW Bath Door -->
  <rect x="145" y="370" width="10" height="20" fill="#fff" stroke="#fff" stroke-width="2"/>

  <!-- SW Bath Door -->
  <rect x="365" y="370" width="10" height="20" fill="#fff" stroke="#fff" stroke-width="2"/>

  <!-- Dimensions/Setbacks -->
  <line x1="200" y1="450" x2="200" y2="400" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4"/>
  <text x="210" y="425" font-family="Arial" font-size="10" fill="#d32f2f">5'</text>

  <line x1="0" y1="350" x2="110" y2="350" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4"/>
  <text x="55" y="345" font-family="Arial" font-size="10" text-anchor="middle" fill="#d32f2f">11'</text>

  <!-- 4' extra gap on North side beside Hall -->
  <line x1="110" y1="200" x2="150" y2="200" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4"/>
  <text x="130" y="195" font-family="Arial" font-size="10" text-anchor="middle" fill="#d32f2f">4'</text>

  <!-- 4' extra gap on South side beside Kitchen -->
  <line x1="370" y1="200" x2="410" y2="200" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4"/>
  <text x="390" y="195" font-family="Arial" font-size="10" text-anchor="middle" fill="#d32f2f">4'</text>

  <line x1="200" y1="140" x2="200" y2="0" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4"/>
  <text x="215" y="70" font-family="Arial" font-size="10" fill="#d32f2f">14'</text>

  <!-- Compass -->
  <g transform="translate(600, 50)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#000" stroke-width="2"/>
    <text x="-35" y="5" font-family="Arial" font-size="12" text-anchor="middle">ఉత్తరం</text>
    <text x="35" y="5" font-family="Arial" font-size="12" text-anchor="middle">దక్షిణం</text>
    <text x="0" y="-30" font-family="Arial" font-size="12" text-anchor="middle">తూర్పు</text>
    <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle">పడమర</text>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Area Calculation Box -->
  <g transform="translate(450, 490)">
    <rect x="0" y="0" width="220" height="90" fill="#fcfcfc" stroke="#333" stroke-width="1.5" rx="5"/>
    <text x="110" y="20" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">వైశాల్యం లెక్కలు (Area Info)</text>
    <line x1="10" y1="30" x2="210" y2="30" stroke="#ccc" stroke-width="1"/>
    
    <text x="15" y="45" font-family="Arial" font-size="11" fill="#000">లోపలి స్థలం (Carpet):</text>
    <text x="205" y="45" font-family="Arial" font-size="11" font-weight="bold" text-anchor="end" fill="#000">692 SFT</text>
    
    <text x="15" y="60" font-family="Arial" font-size="11" fill="#000">గోడలు (Wall Area):</text>
    <text x="205" y="60" font-family="Arial" font-size="11" font-weight="bold" text-anchor="end" fill="#000">112 SFT</text>
    
    <line x1="10" y1="70" x2="210" y2="70" stroke="#ccc" stroke-width="1"/>
    
    <text x="15" y="83" font-family="Arial" font-size="11" font-weight="bold" fill="#d32f2f">మొత్తం (Built-up):</text>
    <text x="205" y="83" font-family="Arial" font-size="11" font-weight="bold" text-anchor="end" fill="#d32f2f">804 SFT</text>
  </g>
</svg>
